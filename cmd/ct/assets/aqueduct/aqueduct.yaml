name: feature

cataractae_definitions:
  implementer:
    name: Implementer
    description: "Expert software engineer implementing features using TDD."
    # persona loaded from cataractae/implementer/PERSONA.md
    # instructions loaded from cataractae/implementer/INSTRUCTIONS.md

  simplifier:
    name: Code Simplifier
    description: "Refines recently-written code for clarity, consistency, and maintainability without changing behaviour."
    # persona loaded from cataractae/simplifier/PERSONA.md
    # instructions loaded from cataractae/simplifier/INSTRUCTIONS.md

  reviewer:
    name: Adversarial Reviewer
    description: "Rigorous code reviewer — finds problems in diffs with zero tolerance for mediocrity."
    # persona loaded from cataractae/reviewer/PERSONA.md
    # instructions loaded from cataractae/reviewer/INSTRUCTIONS.md

  qa:
    name: QA Reviewer
    description: "Adversarial QA engineer — active verification, last line of defence before PR."
    # persona loaded from cataractae/qa/PERSONA.md
    # instructions loaded from cataractae/qa/INSTRUCTIONS.md

  security:
    name: Security Reviewer
    description: "Security-focused reviewer — audits diffs for vulnerabilities."
    # persona loaded from cataractae/security/PERSONA.md
    # instructions loaded from cataractae/security/INSTRUCTIONS.md

  docs_writer:
    name: Docs Writer
    description: "Updates documentation for all user-visible changes in the diff."
    # persona loaded from cataractae/docs_writer/PERSONA.md
    # instructions loaded from cataractae/docs_writer/INSTRUCTIONS.md

  delivery:
    name: Delivery
    description: "Owns everything from branch to merged — rebase, PR, CI, conflicts, merge."
    # persona loaded from cataractae/delivery/PERSONA.md
    # instructions loaded from cataractae/delivery/INSTRUCTIONS.md

complexity:
  trivial:
    level: 1
    skip_cataractae: [adversarial-review, qa, docs]
  standard:
    level: 2
    skip_cataractae: [qa]
  full:
    level: 3
    skip_cataractae: []
  critical:
    level: 4
    skip_cataractae: []
    require_human: true

cataractae:
  - name: implement
    type: agent
    identity: implementer
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: github-workflow
        path: skills/github-workflow/SKILL.md
    timeout_minutes: 30
    on_pass: simplify
    on_fail: blocked
    on_escalate: human

  - name: simplify
    type: agent
    identity: simplifier
    model: opus
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: code-simplifier
        path: skills/code-simplifier/SKILL.md
    timeout_minutes: 20
    skip_for: [1] # trivial droplets skip simplification
    on_pass: adversarial-review
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: adversarial-review
    type: agent
    identity: reviewer
    model: sonnet
    context: diff_only
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: critical-code-reviewer
        path: skills/critical-code-reviewer/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: github-workflow
        path: skills/github-workflow/SKILL.md
      - name: adversarial-reviewer
        path: skills/adversarial-reviewer/SKILL.md
    timeout_minutes: 15
    skip_for: [1] # trivial droplets skip this cataractae
    on_pass: qa
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: qa
    type: agent
    identity: qa
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 20
    skip_for: [1, 2] # trivial and standard droplets skip this cataractae
    on_pass: security-review
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: security-review
    type: agent
    identity: security
    model: sonnet
    context: diff_only
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
    timeout_minutes: 15
    skip_for: [1, 2, 3] # only critical droplets run security review
    on_pass: docs
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: docs
    type: agent
    identity: docs_writer
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 20
    skip_for: [1] # trivial droplets skip docs
    on_pass: delivery
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: delivery
    type: agent
    identity: delivery
    skills:
      - name: github-workflow
        path: skills/github-workflow/SKILL.md
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 60
    on_pass: done
    on_recirculate: implement
    on_escalate: human
