repos:
  - name: ScaledTest
    url: https://github.com/example/scaled-test
    workflow_path: workflow.yaml
    cataractae: 2
    names:
      - upstream
      - tributary
    prefix: st

  - name: cistern
    url: https://github.com/example/cistern
    workflow_path: workflow.yaml
    cataractae: 1
    names:
      - headwater
    prefix: ct

max_cataractae: 3
handoff_token_threshold: 150000
